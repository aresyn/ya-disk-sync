name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: tar.gz
          - name: windows-x86_64
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Select Rust toolchain
        run: rustup default stable

      - name: Check tag matches Cargo version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Build release binary
        run: cargo build --release -p yds-cli

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          artifact="ya-disk-sync-${version}-${{ matrix.name }}"
          mkdir -p "dist/${artifact}"
          cp target/release/ya-disk-sync "dist/${artifact}/ya-disk-sync"
          cp README.md "dist/${artifact}/README.md"
          cp LICENSE "dist/${artifact}/LICENSE"
          cp -R docs "dist/${artifact}/docs"
          cp -R assets "dist/${artifact}/assets"
          tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
          sha256sum "dist/${artifact}.tar.gz" > "dist/${artifact}.tar.gz.sha256"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath Cargo.toml -Raw | Select-String -Pattern 'version = "([^"]+)"').Matches[0].Groups[1].Value
          $artifact = "ya-disk-sync-$version-${{ matrix.name }}"
          $payload = "dist\windows-payload"
          New-Item -ItemType Directory -Force -Path $payload | Out-Null
          New-Item -ItemType Directory -Force -Path "$payload\scripts" | Out-Null
          Copy-Item -LiteralPath "target\release\ya-disk-sync.exe" -Destination "$payload\ya-disk-sync.exe"
          Copy-Item -LiteralPath "README.md" -Destination "$payload\README.md"
          Copy-Item -LiteralPath "LICENSE" -Destination "$payload\LICENSE"
          Copy-Item -LiteralPath "docs" -Destination "$payload\docs" -Recurse
          Copy-Item -LiteralPath "assets" -Destination "$payload\assets" -Recurse
          Copy-Item -LiteralPath "scripts\install-windows-service.ps1" -Destination "$payload\scripts\install-windows-service.ps1"

          Compress-Archive -Path "$payload\*" -DestinationPath "dist\$artifact-portable.zip" -Force

          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path -LiteralPath $iscc)) {
            $iscc = (Get-Command ISCC.exe -ErrorAction Stop).Source
          }
          $payloadPath = (Resolve-Path -LiteralPath $payload).Path
          $distPath = (Resolve-Path -LiteralPath "dist").Path
          $generatedIss = "dist\ya-disk-sync-$version.generated.iss"
          $issTemplate = Get-Content -LiteralPath "packaging\windows\ya-disk-sync.iss" -Raw -Encoding UTF8
          $issTemplate.Replace('#define AppVersion "0.1.1"', "#define AppVersion `"$version`"") |
            Set-Content -LiteralPath $generatedIss -Encoding UTF8
          & $iscc $generatedIss "/DPayloadDir=$payloadPath" "/DOutputDir=$distPath"
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup build failed"
          }

          foreach ($path in @("dist\$artifact-portable.zip", "dist\$artifact-setup.exe")) {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $path
            "$($hash.Hash.ToLowerInvariant())  $(Split-Path -Leaf $path)" |
              Set-Content -LiteralPath "$path.sha256" -Encoding ASCII
          }

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ya-disk-sync-${{ matrix.name }}
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create combined checksums
        shell: bash
        run: |
          cd dist
          files=(ya-disk-sync-*linux-x86_64.tar.gz ya-disk-sync-*windows-x86_64-setup.exe)
          if compgen -G "ya-disk-sync-*windows-x86_64-portable.zip" > /dev/null; then
            files+=(ya-disk-sync-*windows-x86_64-portable.zip)
          fi
          sha256sum "${files[@]}" > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.tar.gz
            dist/SHA256SUMS
